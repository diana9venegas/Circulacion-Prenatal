<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIRCULACIÓN PRENATAL-Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #8c3d49;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 700px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #8c3d49;
            margin-bottom: 10px;
            font-size: 2.2em;
            font-family: "lilita one";
        }

        .start-screen {
            text-align: center;
            padding: 30px 0;
        }

        .start-screen h2 {
            color: #8c3d49;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .start-info {
            background: #f9f9f9;
            padding: 25px;
            border-radius: 15px;
            margin: 30px 0;
            text-align: left;
        }

        .info-item {
            display: flex;
            align-items: center;
            margin: 15px 0;
            font-size: 1.1em;
            color: #333;
        }

        .info-item span {
            font-size: 1.5em;
            margin-right: 15px;
        }

        .start-button {
            background: linear-gradient(135deg, #8c3d49, #b85b6a);
            color: white;
            border: none;
            padding: 18px 50px;
            border-radius: 30px;
            font-size: 1.3em;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            margin-top: 20px;
        }

        .start-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        /* Temporizador */
        .timer-container {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            margin: 20px 0;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 10px;
            gap: 15px;
        }

        .timer-icon {
            font-size: 1.5em;
        }

        .timer-display {
            font-size: 1.8em;
            font-weight: bold;
            color: #8c3d49;
            font-family: 'Courier New', monospace;
        }

        .timer-display.warning {
            color: #ff9800;
            animation: pulse 1s infinite;
        }

        .timer-display.danger {
            color: #f44336;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #f0f0f0;
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #fd93a2, #b85b6a);
            width: 0%;
            transition: width 0.3s ease;
        }

        .score-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 10px;
        }

        .score-item {
            text-align: center;
        }

        .score-label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
        }

        .score-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #8c3d49;
        }

        .question-container {
            margin: 30px 0;
        }

        .question-number {
            font-size: 1em;
            color: #b85b6a;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .question-text {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option {
            padding: 18px 25px;
            background: white;
            border: 3px solid #fd93a2;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.1em;
            position: relative;
            overflow: hidden;
        }

        .option:hover {
            background: #ffe0e6;
            transform: translateX(5px);
            border-color: #b85b6a;
        }

        .option.selected {
            background: #fd93a2;
            border-color: #fd93a2;
            color: white;
        }

        .option.correct {
            background: #4caf50;
            border-color: #4caf50;
            color: white;
            animation: correctPulse 0.5s;
        }

        .option.incorrect {
            background: #f44336;
            border-color: #f44336;
            color: white;
            animation: shake 0.5s;
        }

        .option.disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .button-container {
            text-align: center;
            margin-top: 30px;
        }

        button {
            background:  #b85b6a;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1.1em;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        button:hover {
            background: #b85b6a;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .result-container {
            text-align: center;
            padding: 30px;
            display: none;
        }

        .result-container.show {
            display: block;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-icon {
            font-size: 5em;
            margin-bottom: 20px;
        }

        .result-title {
            font-size: 2em;
            color: #8c3d49;
            margin-bottom: 15px;
        }

        .result-score {
            font-size: 1.5em;
            color: #fd93a2;
            margin-bottom: 30px;
        }

        .result-message {
            font-size: 1.2em;
            color: #ffffff;
            margin-bottom: 20px;
        }

        .result-time {
            font-size: 1.1em;
            color: #666;
            margin-bottom: 20px;
        }

        /* Pantalla de tiempo agotado */
        .timeout-screen {
            text-align: center;
            padding: 30px;
            display: none;
        }

        .timeout-screen.show {
            display: block;
            animation: fadeIn 0.5s;
        }

        .timeout-icon {
            font-size: 6em;
            margin-bottom: 20px;
            animation: shake 1s;
        }

        .timeout-title {
            font-size: 2.2em;
            color: #f44336;
            margin-bottom: 15px;
        }

        .timeout-message {
            font-size: 1.3em;
            color: #666;
            margin-bottom: 30px;
        }

        .feedback {
            margin-top: 15px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            animation: slideDown 0.3s;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #4caf50;
        }

        .feedback.incorrect {
            background: #ffebee;
            color: #c62828;
            border-left: 4px solid #f44336;
        }

        .hidden {
            display: none;
        }

        .top-button-container {
            text-align: left;
            margin-bottom: 20px;
        }

        .back-button, .secondary-button {
            background: #ffffff;
            color: #8c3d49;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }

        .back-button:hover, .secondary-button:hover {
            background: #ffffff;
            color: #8c3d49;
            transform: translateY(-2px);
        }

        .quiz-controls {
            display: flex;
            gap: 10px;
            justify-content: flex-start;
        }

        .timer-center {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .quiz-controls-right {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .control-button {
            background: white;
            color: #8c3d49;
            border: 2px solid #8c3d49;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .control-button:hover {
            background: #8c3d49;
            color: white;
            transform: translateY(-2px);
        }

        .exit-button {
            border-color: #f44336;
            color: #f44336;
        }

        .exit-button:hover {
            background: #f44336;
            color: white;
        }

        .pause-button.paused {
            background: #8c3d49;
            color: white;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Modal de pausa */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s;
        }

        .modal.hidden {
            display: none !important;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .modal-content h2 {
            color: #8c3d49;
            margin-bottom: 15px;
            font-size: 2em;
        }

        .modal-content p {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 30px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }
            
            h1 {
                font-size: 1.6em;
            }
            
            .question-text {
                font-size: 1.1em;
            }
            
            .option {
                padding: 15px 20px;
                font-size: 1em;
            }

            .timer-display {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>CIRCULACIÓN-PRENATAL-Quiz</h1>

        <div class="start-screen" id="startScreen">
            <div class="top-button-container">
                <button class="back-button" onclick="goBack()">← Volver</button>
            </div>
        
            <h2>¡Bienvenido al Quiz!</h2>

            <div class="start-info">
                <div class="info-item">
                    <span>⏱️</span>
                    <div>Tendrás <strong>2 minutos</strong> para completar el quiz</div>
                </div>
                <div class="info-item">
                    <span>🎯</span>
                    <div>Cada respuesta correcta vale <strong>10 puntos</strong></div>
                </div>
            </div>

            <button class="start-button" onclick="startQuiz()">Comenzar Quiz</button>
        </div>

        <div class="timer-container hidden" id="timerContainer">
            <div class="quiz-controls">
            </div>

            <div class="timer-center">
                <div class="timer-display" id="timerDisplay">02:00</div>
            </div>

            <div class="quiz-controls-right">
                <button class="control-button pause-button" onclick="togglePause()" id="pauseButton">Pausa</button>
            </div>
        </div>



        <div class="progress-bar hidden" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="score-container hidden" id="scoreContainer">
            <div class="score-item">
                <div class="score-label">Pregunta</div>
                <div class="score-value"><span id="currentQuestion">1</span>/<span id="totalQuestions">5</span></div>
            </div>
            <div class="score-item">
                <div class="score-label">Correctas</div>
                <div class="score-value" id="correctScore">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">Puntos</div>
                <div class="score-value" id="points">0</div>
            </div>
        </div>

        <div class="quiz-container hidden" id="quizContainer">
            <div class="question-container">
                <div class="question-number" id="questionNumber">Pregunta 1</div>
                <div class="question-text" id="questionText"></div>
                
                <div class="options-container" id="optionsContainer"></div>
                
                <div class="feedback" id="feedback"></div>
            </div>

            <div class="button-container">
                <button id="nextButton" onclick="nextQuestion()" disabled>Siguiente Pregunta →</button>
            </div>
        </div>

        <!-- Pantalla de tiempo agotado -->
        <div class="timeout-screen" id="timeoutScreen">
            <div class="timeout-icon">⏰</div>
            <div class="timeout-title">¡Tiempo Agotado!</div>
            <div class="timeout-message">Se acabó el tiempo antes de completar el quiz</div>
            <div class="result-score" id="timeoutScore"></div>
            <div class="button-group">
                <button onclick="restartQuiz()">Volver a Intentar</button>
                <button onclick="goBack()" class="secondary-button">← Volver</button>
            </div>
        </div>

        <div class="modal hidden" id="pauseModal" style="display: none;">
            <div class="modal-content">
                <h2>Quiz Pausado</h2>
                <p>El temporizador está detenido</p>
                <div class="button-group">
                    <button onclick="togglePause()">Continuar</button>
                    <button onclick="exitQuiz()" class="secondary-button">Salir</button>
                </div>
            </div>
        </div>

        <div class="result-container" id="resultContainer">
            <div class="result-icon" id="resultIcon"></div>
            <div class="result-title" id="resultTitle"></div>
            <div class="result-score" id="resultScore"></div>
            <div class="result-time" id="resultTime"></div>
            <div class="result-message" id="resultMessage"></div>
            <div class="button-group">
                <button onclick="restartQuiz()">Volver a Intentar</button>
                <button onclick="goBack()" class="secondary-button">← Volver</button>
            </div>
        </div>
    </div>

    <script>
        const questionBank = [
        {
            question: "¿Cuánto oxígeno tiene la sangre que le llega al bebé desde la placenta?",
            options: ["Como 60%", "Como 70%", "Como 80%", "Como 90%"],
            correct: 2,
            explanation: "La placenta le da al bebé sangre con aproximadamente 80% de oxígeno, que es lo máximo que puede recibir."
        },
        {
            question: "¿Por dónde viaja la sangre con oxígeno desde la placenta hasta el bebé?",
            options: ["Arteria umbilical", "Vena umbilical", "Conducto venoso", "Vena cava inferior"],
            correct: 1,
            explanation: "La vena umbilical es como un tubo que lleva sangre con oxígeno de la placenta al bebé."
        },
        {
            question: "¿Cómo es la presión de la sangre que viene de la placenta?",
            options: ["Baja y lenta", "Alta por el bombeo de la placenta", "Normal como en los adultos", "Cambia todo el tiempo"],
            correct: 1,
            explanation: "La placenta bombea la sangre con mucha fuerza, por eso la presión es alta cuando viaja al bebé."
        },
        {
            question: "Cuando la sangre con oxígeno llega al hígado del bebé, ¿qué hace la mayor parte?",
            options: ["Entra toda al hígado", "Se divide en partes iguales", "Pasa de largo por un atajo especial", "Se queda guardada en el hígado"],
            correct: 2,
            explanation: "Solo un poquito entra al hígado; la mayor parte toma un atajo llamado conducto venoso para llegar más rápido al corazón."
        },
        {
            question: "¿A dónde llega el conducto venoso (el atajo)?",
            options: ["Aurícula derecha", "Ventrículo izquierdo", "Vena cava superior", "Vena cava inferior"],
            correct: 3,
            explanation: "El conducto venoso llega a un tubo grande llamado vena cava inferior, que va directo al corazón."
        },
        {
            question: "En la vena cava inferior, ¿con qué sangre se mezcla la sangre con oxígeno?",
            options: ["Sangre de la cabeza y brazos", "Sangre de las piernas, pelvis y riñones", "Sangre de los pulmones", "Sangre de la arteria pulmonar"],
            correct: 1,
            explanation: "Se mezcla con sangre que viene de las piernas, la pelvis y los riñones del bebé, que tiene menos oxígeno."
        },
        {
            question: "¿Hacia dónde va preferentemente la sangre con más oxígeno dentro del corazón?",
            options: ["Ventrículo derecho", "Arteria pulmonar", "Hacia el tabique (pared) entre las aurículas", "Vena cava superior"],
            correct: 2,
            explanation: "La sangre con más oxígeno se dirige hacia la pared que separa las dos aurículas del corazón."
        },
        {
            question: "En la aurícula derecha, ¿con qué otra sangre se mezcla?",
            options: ["Sangre de las arterias umbilicales", "Sangre de la vena cava superior", "Sangre de la placenta", "Sangre del conducto arterioso"],
            correct: 1,
            explanation: "Se mezcla con sangre que viene de la cabeza y los brazos del bebé a través de la vena cava superior."
        },
        {
            question: "¿Por cuáles dos agujeritos especiales pasa la sangre para ir de la aurícula derecha a la izquierda?",
            options: ["Válvula mitral y válvula aórtica", "Conducto venoso y conducto arterioso", "Foramen oval y foramen secundum", "Válvula tricúspide y válvula pulmonar"],
            correct: 2,
            explanation: "La sangre pasa por dos agujeritos especiales llamados foramen oval y foramen secundum para cambiar de lado en el corazón."
        },
        {
            question: "¿Por qué es importante que la sangre pase directamente de aurícula derecha a izquierda?",
            options: ["Para evitar el hígado", "Porque los pulmones del bebé todavía no funcionan", "Para aumentar la presión", "Para mezclar más la sangre"],
            correct: 1,
            explanation: "Como el bebé todavía no respira, sus pulmones no funcionan, entonces la sangre toma un atajo para no ir a los pulmones."
        },
        {
            question: "¿Por qué solo un poquito de sangre va de la aurícula derecha al ventrículo derecho?",
            options: ["El ventrículo derecho es muy chiquito", "La válvula está medio cerrada", "El agujerito (foramen oval) es chico y no toda la sangre cabe", "La presión es muy alta"],
            correct: 2,
            explanation: "El foramen oval (agujerito especial) no es muy grande, entonces no toda la sangre puede pasar por ahí y un poco va al ventrículo derecho."
        },
        {
            question: "¿Qué tipo de sangre es la que va por el camino secundario (aurícula derecha → ventrículo derecho)?",
            options: ["Sangre con más oxígeno", "Sangre con menos oxígeno", "Sangre con todo el oxígeno", "Sangre sin nada de oxígeno"],
            correct: 1,
            explanation: "La sangre que va por ese camino tiene menos oxígeno, principalmente viene de la cabeza y los brazos."
        },
        {
            question: "La sangre de la vena cava superior viene de:",
            options: ["Pelvis y piernas", "Cabeza y brazos", "Placenta", "Hígado"],
            correct: 1,
            explanation: "La vena cava superior trae sangre con poco oxígeno de la cabeza y los brazos del bebé."
        },
        {
            question: "¿A dónde va la sangre con menos oxígeno que sale del ventrículo derecho?",
            options: ["Aorta ascendente", "Foramen oval", "A la arteria pulmonar y luego regresa a la placenta", "Directo a la aurícula izquierda"],
            correct: 2,
            explanation: "La sangre con poco oxígeno sale por la arteria pulmonar y después regresa a la placenta por las arterias umbilicales para conseguir más oxígeno."
        },
        {
            question: "¿Para qué sirve el conducto venoso (el atajo especial)?",
            options: ["Para darle oxígeno a la sangre", "Para que la sangre con oxígeno llegue rápido al corazón", "Para limpiar la sangre", "Para calentar la sangre"],
            correct: 1,
            explanation: "El conducto venoso es como un atajo que ayuda a que la sangre con mucho oxígeno llegue rapidito al corazón sin pasar por el hígado."
        }
        ];

        let questions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let selectedAnswer = null;
        let answered = false;
        let timerInterval;
        let timeRemaining = 120; // 2 minutos en segundos
        let isPaused = false;

        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        function selectRandomQuestions() {
            // Crear copia del banco de preguntas para no modificar el original
            const availableQuestions = [...questionBank];
            const selectedQuestions = [];
            
            // Seleccionar exactamente 5 preguntas únicas
            while (selectedQuestions.length < 5 && availableQuestions.length > 0) {
                const randomIndex = Math.floor(Math.random() * availableQuestions.length);
                selectedQuestions.push(availableQuestions[randomIndex]);
                availableQuestions.splice(randomIndex, 1); // Eliminar la pregunta seleccionada
            }
    
            return selectedQuestions;
        }

        function startQuiz() {
            // Seleccionar 5 preguntas aleatorias
            questions = selectRandomQuestions();
            
            // Ocultar pantalla de inicio
            document.getElementById('startScreen').classList.add('hidden');

            // Asegurar que modal de pausa esté oculto
            const pauseModal = document.getElementById('pauseModal');
            if (pauseModal) {
                pauseModal.style.display = 'none';
                pauseModal.classList.add('hidden');
            }

            // Mostrar elementos del quiz
            document.getElementById('timerContainer').classList.remove('hidden');
            document.getElementById('progressBar').classList.remove('hidden');
            document.getElementById('scoreContainer').classList.remove('hidden');
            document.getElementById('quizContainer').classList.remove('hidden');
            
            // Reiniciar variables
            currentQuestionIndex = 0;
            score = 0;
            timeRemaining = 120;
            isPaused = false;
            answered = false;
            selectedAnswer = null;
            
            // Resetear botón de pausa
            const pauseButton = document.getElementById('pauseButton');
            if (pauseButton) {
                pauseButton.textContent = 'Pausa';
                pauseButton.classList.remove('paused');
            }
            
            // Iniciar temporizador
            startTimer();
            
            // Cargar primera pregunta
            loadQuestion();
        }

        function startTimer() {
            updateTimerDisplay();
            
            timerInterval = setInterval(() => {
                timeRemaining--;
                updateTimerDisplay();
                
                if (timeRemaining <= 0) {
                    clearInterval(timerInterval);
                    showTimeoutScreen();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(timeRemaining / 60);
            const seconds = timeRemaining % 60;
            const display = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            const timerElement = document.getElementById('timerDisplay');
            timerElement.textContent = display;
            
            // Cambiar color según el tiempo restante
            timerElement.classList.remove('warning', 'danger');
            if (timeRemaining <= 60) {
                timerElement.classList.add('danger');
            } else if (timeRemaining <= 90) {
                timerElement.classList.add('warning');
            }
        }

        function showTimeoutScreen() {
            document.getElementById('quizContainer').classList.add('hidden');
            document.getElementById('timerContainer').classList.add('hidden');
            document.getElementById('progressBar').classList.add('hidden');
            document.getElementById('scoreContainer').classList.add('hidden');
            
            const timeoutScreen = document.getElementById('timeoutScreen');
            timeoutScreen.classList.add('show');
            
            const percentage = (score / questions.length) * 100;
            document.getElementById('timeoutScore').textContent = 
                `Respondiste correctamente ${score} de ${currentQuestionIndex} preguntas (${percentage.toFixed(0)}%)`;
        }

        function loadQuestion() {
            const question = questions[currentQuestionIndex];
            
            document.getElementById('questionNumber').textContent = `Pregunta ${currentQuestionIndex + 1}`;
            document.getElementById('questionText').textContent = question.question;
            document.getElementById('currentQuestion').textContent = currentQuestionIndex + 1;
            document.getElementById('totalQuestions').textContent = questions.length;
            
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            question.options.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                optionDiv.textContent = option;
                optionDiv.onclick = () => selectAnswer(index);
                optionsContainer.appendChild(optionDiv);
            });
            
            document.getElementById('feedback').classList.remove('show');
            document.getElementById('nextButton').disabled = true;

            const nextButton = document.getElementById('nextButton');
            if (currentQuestionIndex === questions.length - 1) {
                nextButton.textContent = 'Ver Resultados';
            } else {
                nextButton.textContent = 'Siguiente Pregunta →';
            }
            
            updateProgress();
            answered = false;
            selectedAnswer = null;
        }

        function selectAnswer(index) {
            if (answered) return;
            
            selectedAnswer = index;
            const question = questions[currentQuestionIndex];
            const options = document.querySelectorAll('.option');
            
            answered = true;
            
            options.forEach((option, i) => {
                option.classList.add('disabled');
                if (i === question.correct) {
                    option.classList.add('correct');
                } else if (i === index) {
                    option.classList.add('incorrect');
                }
            });
            
            const feedback = document.getElementById('feedback');
            feedback.classList.add('show');
            
            if (index === question.correct) {
                score++;
                feedback.className = 'feedback show correct';
                feedback.innerHTML = `<strong>¡Correcto! ✓</strong><br>${question.explanation}`;
                document.getElementById('correctScore').textContent = score;
                document.getElementById('points').textContent = score * 10;
            } else {
                feedback.className = 'feedback show incorrect';
                feedback.innerHTML = `<strong>Incorrecto ✗</strong><br>${question.explanation}`;
            }
            
            document.getElementById('nextButton').disabled = false;
        }

        function nextQuestion() {
            currentQuestionIndex++;
            
            if (currentQuestionIndex < questions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function updateProgress() {
            const progress = ((currentQuestionIndex + 1) / questions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function showResults() {
            clearInterval(timerInterval);
            
            document.getElementById('quizContainer').classList.add('hidden');
            document.getElementById('timerContainer').classList.add('hidden');
            document.getElementById('progressBar').classList.add('hidden');
            document.getElementById('scoreContainer').classList.add('hidden');
            document.getElementById('resultContainer').classList.add('show');
            
            const percentage = (score / questions.length) * 100;
            const timeTaken = 120 - timeRemaining;
            const minutes = Math.floor(timeTaken / 60);
            const seconds = timeTaken % 60;
            
            let icon, title, message;
            
            if (percentage >= 90) {
                icon = '🏆';
                title = '¡Excelente!';
                message = '¡Eres un experto en el sistema circulatorio!';
            } else if (percentage >= 70) {
                icon = '🎉';
                title = '¡Muy Bien!';
                message = '¡Tienes un buen conocimiento del tema!';
            } else if (percentage >= 50) {
                icon = '👍';
                title = '¡Bien!';
                message = 'Vas por buen camino, sigue estudiando.';
            } else {
                icon = '📚';
                title = 'Sigue Practicando';
                message = 'Repasa el tema y vuelve a intentarlo.';
            }
            
            document.getElementById('resultIcon').textContent = icon;
            document.getElementById('resultTitle').textContent = title;
            document.getElementById('resultScore').textContent = `${score} de ${questions.length} correctas (${percentage.toFixed(0)}%)`;
            document.getElementById('resultMessage').textContent = message;
        }

        function restartQuiz() {
            if (timerInterval) {
                clearInterval(timerInterval);
            }

            document.getElementById('resultContainer').classList.remove('show');
            document.getElementById('timeoutScreen').classList.remove('show');
            document.getElementById('quizContainer').classList.add('hidden');
            document.getElementById('timerContainer').classList.add('hidden');
            document.getElementById('progressBar').classList.add('hidden');
            document.getElementById('scoreContainer').classList.add('hidden');

            const pauseModal = document.getElementById('pauseModal');
            if (pauseModal) {
                pauseModal.style.display = 'none';
                pauseModal.classList.add('hidden');
            }
    
            // Mostrar pantalla de inicio
            document.getElementById('startScreen').classList.remove('hidden');
    
            // Reiniciar variables
            currentQuestionIndex = 0;
            score = 0;
            timeRemaining = 120;
            answered = false;
            selectedAnswer = null;
            isPaused = false;
    
            // Limpiar puntuación
            document.getElementById('correctScore').textContent = '0';
            document.getElementById('points').textContent = '0';
        }
        function goBack() {
            window.location.href = "linea_niños.html";
        }

        function togglePause() {
            isPaused = !isPaused;
            const pauseButton = document.getElementById('pauseButton');
            const pauseModal = document.getElementById('pauseModal');
            
            if (isPaused) {
                clearInterval(timerInterval);
                pauseButton.textContent = 'Continuar';
                pauseButton.classList.add('paused');
                pauseModal.style.display = 'flex';
                pauseModal.classList.remove('hidden');
            } else {
                startTimer();
                pauseButton.textContent = 'Pausa';
                pauseButton.classList.remove('paused');
                pauseModal.style.display = 'none';
                pauseModal.classList.add('hidden');
            }
        }

        function exitQuiz() {
            if (confirm('¿Estás seguro de que quieres salir? Se perderá tu progreso.')) {
                if (timerInterval) {
                    clearInterval(timerInterval);
                }
                
                // Ocultar modal de pausa
                const pauseModal = document.getElementById('pauseModal');
                pauseModal.style.display = 'none';
                pauseModal.classList.add('hidden');
                
                // Reiniciar todo
                currentQuestionIndex = 0;
                score = 0;
                timeRemaining = 120;
                answered = false;
                selectedAnswer = null;
                isPaused = false;
                
                // Ocultar quiz
                document.getElementById('quizContainer').classList.add('hidden');
                document.getElementById('timerContainer').classList.add('hidden');
                document.getElementById('progressBar').classList.add('hidden');
                document.getElementById('scoreContainer').classList.add('hidden');
                
                // Mostrar inicio
                document.getElementById('startScreen').classList.remove('hidden');
                
                // Limpiar puntuación
                document.getElementById('correctScore').textContent = '0';
                document.getElementById('points').textContent = '0';
            }
        }

        
    </script>
</body>
</html>
